<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Oficial - Atlético Estación 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #008f39; --primary-dark: #006400; --accent: #ff9100; --bg: #f0fdf4; --white: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #1a2e1a; }
        
        .main-card { max-width: 950px; margin: 0 auto; background: var(--white); border-radius: 30px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        
        /* Cabecera con Imagen */
        .banner-container { width: 100%; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }

        .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 30px 20px; text-align: center; }
        .hero h1 { font-family: 'Fredoka', cursive; margin: 0; font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); text-transform: uppercase; }
        
        .highlights { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; padding: 20px; background: #f8fff9; border-bottom: 1px solid #eee; }
        .h-item { text-align: center; font-size: 0.9em; }
        .h-item i { color: var(--primary); font-size: 1.2em; display: block; margin-bottom: 5px; }

        .form-content { padding: 30px; }
        .section-title { display: flex; align-items: center; gap: 10px; margin: 35px 0 15px; color: var(--primary-dark); font-size: 1.2em; font-weight: 700; border-bottom: 2px solid #d8f3dc; padding-bottom: 8px; }
        .section-title i { background: var(--primary); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.7em; }

        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
        .col-1 { grid-column: span 1; } .col-2 { grid-column: span 2; } .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; } .col-6 { grid-column: span 6; } .col-12 { grid-column: span 12; }

        label { display: block; font-size: 0.75em; font-weight: 700; color: #444; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e8f0e8; border-radius: 12px; font-size: 0.95em; transition: 0.3s; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(0, 143, 57, 0.1); }

        .auth-card { background: #fff9f0; border: 2px solid #ffecb3; padding: 25px; border-radius: 20px; margin-top: 30px; }
        .check-row { display: flex; gap: 12px; margin-bottom: 15px; cursor: pointer; align-items: flex-start; font-size: 0.9em; }
        .check-row input { width: 22px; height: 22px; accent-color: var(--primary); flex-shrink: 0; }

        .btn-submit { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 1.4em; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 25px; box-shadow: 0 8px 15px rgba(0, 143, 57, 0.2); font-family: 'Fredoka'; }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-3px); }

        .jose-link { background: #e3f2fd; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; border: 1px solid #bbdefb; }
        .jose-link a { color: #1976d2; text-decoration: none; font-weight: 700; font-size: 1.1em; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .col-1, .col-2, .col-3, .col-4, .col-6, .col-12 { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="main-card">
    <div class="banner-container">
        <img src="cabecera.jpg" alt="Club Atlético Estación" class="banner-img" onerror="this.src='https://via.placeholder.com/1200x400?text=CLUB+ATLETICO+ESTACION'">
    </div>

    <div class="hero">
        <h1>JORNADAS DE FORMACIÓN</h1>
        <p>Inscripción Oficial Temporada 2026</p>
    </div>

    <div class="highlights">
        <div class="h-item"><i class="fas fa-calendar-check"></i><strong>29 JUN - 10 JUL</strong></div>
        <div class="h-item"><i class="fas fa-wallet"></i><strong>PAGO SEGURO</strong></div>
        <div class="h-item"><i class="fas fa-tshirt"></i><strong>EQUIPACIÓN</strong></div>
        <div class="h-item"><i class="fas fa-users"></i><strong>PLAZAS LIMITADAS</strong></div>
    </div>

    <div class="form-content">
        <div class="jose-link">
            <i class="fab fa-whatsapp"></i> Consultas y Pagos: <strong>José Ruiz</strong> <a href="tel:645931010">645 931 010</a>
        </div>

        <form id="formFinalAtletico">
            <input type="hidden" name="Fecha Registro" id="fecha_registro">

            <div class="section-title"><i>1</i> Elección de Jornada</div>
            <div class="grid">
                <div class="col-6"><label>Periodo de Inscripción *</label>
                    <select name="Semanas de inscripción" required>
                        <option value="1 Semana (55€)">1 Semana de Jornadas (55€)</option>
                        <option value="2 Semanas (95€)">Quincena Completa (95€)</option>
                    </select>
                </div>
                <div class="col-6"><label>Aula Matinal (07:30h)</label>
                    <select name="aula_matinal">
                        <option value="No">No necesito aula matinal</option>
                        <option value="Si">Sí, deseo aula matinal</option>
                    </select>
                </div>
            </div>

            <div class="section-title"><i>2</i> Datos del Tutor Legal</div>
            <div class="grid">
                <div class="col-4"><label>DNI / NIE *</label><input type="text" name="tutor_dni" required></div>
                <div class="col-4"><label>Apellidos *</label><input type="text" name="tutor_apellidos" required></div>
                <div class="col-4"><label>Nombre *</label><input type="text" name="tutor_nombre" required></div>
                
                <div class="col-6"><label>Calle / Dirección *</label><input type="text" name="tutor_domicilio" required></div>
                <div class="col-2"><label>Número</label><input type="text" name="tutor_numero"></div>
                <div class="col-1"><label>Piso</label><input type="text" name="tutor_piso"></div>
                <div class="col-1"><label>Esc.</label><input type="text" name="tutor_escalera"></div>
                <div class="col-1"><label>Plta.</label><input type="text" name="tutor_planta"></div>
                <div class="col-1"><label>Prta.</label><input type="text" name="tutor_puerta"></div>
                
                <div class="col-4"><label>Municipio *</label><input type="text" name="tutor_municipio" value="Cártama"></div>
                <div class="col-4"><label>Provincia *</label><input type="text" name="tutor_provincia" value="Málaga"></div>
                <div class="col-4"><label>Código Postal *</label><input type="text" name="tutor_cp" required></div>
                
                <div class="col-4"><label>Fecha Nacimiento</label><input type="date" name="tutor_fecha_nacimiento"></div>
                <div class="col-4"><label>Teléfono 1 *</label><input type="tel" name="tutor_telefono1" required></div>
                <div class="col-4"><label>Teléfono 2</label><input type="tel" name="tutor_telefono2"></div>
                <div class="col-12"><label>Email de contacto *</label><input type="email" name="tutor_email" required></div>
            </div>

            <div class="section-title"><i>3</i> Datos del Alumno / Jugador</div>
            <div class="grid">
                <div class="col-4"><label>DNI del Niño (si tiene)</label><input type="text" name="jugador_dni"></div>
                <div class="col-4"><label>Apellidos del Niño *</label><input type="text" name="jugador_apellidos" required></div>
                <div class="col-4"><label>Nombre del Niño *</label><input type="text" name="jugador_nombre" required></div>
                
                <div class="col-6"><label>Dirección del Niño</label><input type="text" name="jugador_domicilio"></div>
                <div class="col-2"><label>Número</label><input type="text" name="jugador_numero"></div>
                <div class="col-1"><label>Piso</label><input type="text" name="jugador_piso"></div>
                <div class="col-1"><label>Esc.</label><input type="text" name="jugador_escalera"></div>
                <div class="col-1"><label>Plta.</label><input type="text" name="jugador_planta"></div>
                <div class="col-1"><label>Prta.</label><input type="text" name="jugador_puerta"></div>
                
                <div class="col-4"><label>Municipio</label><input type="text" name="jugador_municipio"></div>
                <div class="col-4"><label>Provincia</label><input type="text" name="jugador_provincia"></div>
                <div class="col-4"><label>C. Postal</label><input type="text" name="jugador_cp"></div>
                
                <div class="col-4"><label>F. Nacimiento Niño *</label><input type="date" name="jugador_fecha_nacimiento" required></div>
                <div class="col-4"><label>Teléfono Jugador 1</label><input type="tel" name="jugador_telefono1"></div>
                <div class="col-4"><label>Teléfono Jugador 2</label><input type="tel" name="jugador_telefono2"></div>

                <div class="col-6"><label>Talla Camiseta *</label>
                    <select name="jugador_talla_camiseta" required>
                        <option value="6">Talla 6</option><option value="8">Talla 8</option><option value="10">Talla 10</option>
                        <option value="12">Talla 12</option><option value="14">Talla 14</option>
                        <option value="S">S Adulto</option><option value="M">M Adulto</option><option value="L">L Adulto</option>
                    </select>
                </div>
                <div class="col-6"><label>Observaciones / Alergias</label><input type="text" name="observaciones"></div>
            </div>

            <div class="auth-card">
                <label class="check-row">
                    <input type="checkbox" required>
                    <span>Autorizo la participación del menor en todas las actividades (piscina, hinchables, etc.) y acepto el uso de imágenes para las redes sociales del club.</span>
                </label>
                <label class="check-row">
                    <input type="checkbox" required>
                    <span>Confirmo que los datos son correctos y entiendo que la plaza solo se reserva tras el pago a José Ruiz.</span>
                </label>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">ENVIAR INSCRIPCIÓN OFICIAL</button>
        </form>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz00BzlQIE2pKcQA7ghVFs_5KhOqwKJ3pTZGRRaijZo0x6-KeN7KQ15ani_0PyA9N-O/exec';
    const form = document.getElementById('formFinalAtletico');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('fecha_registro').value = new Date().toLocaleString();
        btn.disabled = true;
        btn.innerText = 'PROCESANDO ENVÍO...';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => { 
                alert('¡Inscripción registrada correctamente! El club se pondrá en contacto contigo.'); 
                location.reload(); 
            })
            .catch(error => { 
                alert('Error al enviar los datos. Revisa tu conexión.'); 
                btn.disabled = false; 
                btn.innerText = 'ENVIAR INSCRIPCIÓN OFICIAL';
            });
    });
</script>
</body>
</html>
